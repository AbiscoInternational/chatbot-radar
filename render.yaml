services:
  - type: web
    name: chatbotradar
    runtime: python
    plan: starter          # change to 'free' if preferred, but free sleeps after 15 min
    numInstances: 1        # single instance — avoids in-memory state split across instances
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app --workers 4 --threads 2 --worker-class gthread --timeout 120 --bind 0.0.0.0:$PORT
    envVars:
      - key: SECRET_KEY
        generateValue: true   # Render generates and persists this automatically
      - key: DATABASE_URL
        fromDatabase:
          name: chatbotradar-db
          property: connectionString
      - key: PYTHON_VERSION
        value: 3.11.0

databases:
  - name: chatbotradar-db
    plan: starter             # Render's managed Postgres — persists across deploys
    databaseName: chatbotradar
    user: chatbotradar
